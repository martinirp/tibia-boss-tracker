<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibia Boss Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>
                📊 Tibia Boss Tracker
                <span id="worldBadge" class="world-badge">Selecione um mundo</span>
            </h1>
            <p class="subtitle">Rastreador Inteligente de Respawns - Baseado em Histórico de BD Local</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="worldInput" placeholder="Nome do mundo (ex: Antica, Secura, Gladera)" />
                <button onclick="fetchKillStats()">Buscar</button>
            </div>
            <div class="refresh-info">
                ⏱️ Cache: 60 segundos | Dados das últimas 24h e 7 dias
            </div>
        </div>

        <div id="dashboard">
            <div class="loading">🔍 Aguardando busca... Digite um mundo e clique em Buscar</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibia Boss Tracker | Premium Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Metamorphous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2.2">
</head>
<body class="theme-dark">

    <nav class="navbar navbar-expand-lg sticky-top main-nav py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <div class="logo-icon">
                    <i class="fas fa-dragon"></i>
                </div>
                <div class="logo-text">
                    <span class="d-block main-title">BOSS TRACKER</span>
                    <span class="d-block sub-title">AUTONOMOUS INTELLIGENCE</span>
                </div>
            </a>

            <div class="ms-auto d-flex align-items-center gap-3">
                <div class="server-status d-none d-md-flex align-items-center gap-2 px-3 py-2">
                    <span class="status-dot pulse"></span>
                    <span id="worldBadge" class="text-uppercase fw-bold small text-white-50">Quelibra</span>
                </div>
                <button class="btn-collect" id="collectBtn" onclick="forceFetch()">
                    <i class="fas fa-sync-alt me-2"></i>
                    <span id="collectLabel">Coletar Agora</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="glass-panel p-4 mb-4">
            <div class="row align-items-center gy-3">
                <div class="col-lg-6">
                    <h2 class="section-title mb-1">Status</h2>
                    <p class="text-white-50 small mb-0" id="lastUpdate">Sincronizando dados...</p>
                </div>
                <div class="col-lg-6">
                    <div class="filter-pills d-flex gap-2 flex-wrap justify-content-lg-end">
                        <button class="f-pill active" onclick="setFilter('all', this)">Todos</button>
                        <button class="f-pill" onclick="setFilter('hot', this)">Pode Nascer</button>
                        <button class="f-pill" onclick="setFilter('high', this)">Chance Alta</button>
                        <button class="f-pill" onclick="setFilter('recent', this)">Mortes Ontem</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="grid" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 row-cols-xl-6 g-3">
            <div class="col-12 w-100 text-center py-5">
                <div class="loader-container">
                    <div class="spinner-grow text-warning" role="status"></div>
                    <p class="mt-3 fw-bold text-white-50 opacity-75 text-uppercase">Consultando Oráculo...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer mt-auto py-5 border-top border-white-10">
        <div class="container text-center text-white-50 small opacity-50">
            <p class="mb-1 fw-bold">TIBIA BOSS TRACKER v2.2</p>
            <p class="mb-0">Powered by TibiaData API & Statistical Modeling</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js?v=2.2"></script>
</body>
</html>
